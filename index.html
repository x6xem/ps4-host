    <!-- detection logic -->
    <script>
        function isPC() {
            var plat = navigator.platform.toLowerCase();
            return plat.indexOf('win') !== -1 ||
                   plat.indexOf('mac') !== -1 ||
                   plat.indexOf('linux') !== -1;
        }

        function isPS4() {
            // PlayStation user agent typically contains "PlayStation" or "PS4"
            var ua = navigator.userAgent.toLowerCase();
            return ua.indexOf('playstation') !== -1 || ua.indexOf('ps4') !== -1;
        }

        window.addEventListener('DOMContentLoaded', function() {
            var msg = document.getElementById('message');
            if (!msg) return;
            if (isPS4()) {
                msg.textContent = 'Running on PS4 👍';
                msg.style.color = 'cyan';
            } else if (isPC()) {
                msg.textContent = 'Detected PC environment (not allowed)';
                msg.style.color = 'red';
            } else {
                msg.textContent = 'Unknown platform';
                msg.style.color = 'orange';
            }

            // use form submission for triggering
            var form = document.getElementById('payloadForm');
            if (form) {
                form.addEventListener('submit', function(e) {
                    e.preventDefault();
                    var payload = e.submitter ? e.submitter.value : null;
                    if (payload === 'goldhen') {
                        msg.textContent = 'GoldHen payload triggered';
                        msg.style.color = 'white';
                        // actual exploit script already loaded separately
                    } else if (payload === 'mira') {
                        msg.textContent = 'Mira payload triggered';
                        msg.style.color = 'yellow';
                        // custom code to launch mira or fetch payload can go here
                    }
                });
            }
        });
    </script>
