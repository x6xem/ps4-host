                   plat.indexOf('linux') !== -1;
        }

        function isPS4() {
            // PlayStation user agent typically contains "PlayStation" or "PS4"
            var ua = navigator.userAgent.toLowerCase();
            return ua.indexOf('playstation') !== -1 || ua.indexOf('ps4') !== -1;
